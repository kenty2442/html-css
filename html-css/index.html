<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML/CSS</title>
    <!-- style.cssを読み込む -->
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/2489c4ad03.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- header section -->
    <header>
        <dev class="header-logo">CodeVillage</dev>
        <nav class="header-nav">
            <ul>
                <li>TOP</li>
                <li>ABOUT</li>
                <li>NEWS</li>
                <li>SERVICE</li>
                <li>CONTACT</li>
            </ul>
        </nav>
    </header>
    <main>
        <!-- first-section -->
        <section id="first-v">
            <div class="first-v-wrap">
                <h2 class="first-v-title">A life-changing</h2>
                <button class="first-v-btn"><i class="fas fa-door-open"></i>ENTRY</button>
            </div>
        </section>
        <!-- about-section -->
        <section id="about"></section>
        <!-- news-section -->
        <section id="news"></section>
        <!-- entry-section -->
        <section id="entry"></section>
        <!-- contact-section -->
        <section id="contact"></section>
    </main>
    <!-- footer section -->
    <footer>
        <p class="company-info">2017-2021 Permil inc.</p>
    </footer>
</body>
</html>
